name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binaries
        run: |
          mkdir -p dist
          # Linux
          GOOS=linux GOARCH=amd64 go build -o dist/igor-php-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o dist/igor-php-linux-arm64 .
          # macOS
          GOOS=darwin GOARCH=amd64 go build -o dist/igor-php-macos-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/igor-php-macos-arm64 .
          # Windows
          GOOS=windows GOARCH=amd64 go build -o dist/igor-php-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/igor-php-linux-amd64
            dist/igor-php-linux-arm64
            dist/igor-php-macos-amd64
            dist/igor-php-macos-arm64
            dist/igor-php-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
